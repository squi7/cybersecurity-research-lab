<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Protocol Injection</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            padding: 40px;
            background: #0d1117;
            color: #c9d1d9;
        }
        .container {
            border: 1px dashed #30363d;
            padding: 30px;
            border-radius: 6px;
            background: #161b22;
            text-align: center;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            color: #58a6ff;
            border: 1px solid #58a6ff;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.3s;
        }
        .btn:hover {
            background: #58a6ff;
            color: #fff;
        }
        code {
            color: #ff7b72;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Navigasi Pengguna</h2>
        <p>Anda akan diarahkan kembali ke halaman sebelumnya.</p>

        <a href="#" id="back-button" class="btn">Kembali ke Beranda</a>
        <p style="margin-top: 20px; font-size: 0.8em; color: #8b949e;">
            Hint: Gunakan parameter <code>?return_to=URL_TUJUAN</code>
        </p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const targetUrl = urlParams.get('return_to');
        
        if(targetUrl) {
            const backBtn = document.getElementById('back-button');

            //DEVELOPER MISTAKE: Memasukkn input langsung ke atribut href
            backBtn.setAttribute('href', targetUrl);
        }
    </script>
</body>
</html>
